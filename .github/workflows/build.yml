name: Build

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            spec: installer/gameplay_recorder_win.spec
            ffmpeg_url: https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl.zip
            ffmpeg_archive: ffmpeg.zip
            ffmpeg_extract_cmd: >-
              7z e ffmpeg.zip
              "ffmpeg-master-latest-win64-lgpl/bin/ffmpeg.exe"
              -o"resources/ffmpeg" -y
            scrcpy_url: https://github.com/Genymobile/scrcpy/releases/download/v3.3.4/scrcpy-win64-v3.3.4.zip
            scrcpy_archive: scrcpy.zip
            scrcpy_extract_cmd: >-
              7z x scrcpy.zip -o"resources" -y &&
              mv resources/scrcpy-win64-v3.3.4 resources/scrcpy_extracted &&
              cp -r resources/scrcpy_extracted/* resources/scrcpy/ &&
              rm -rf resources/scrcpy_extracted
          - os: macos-latest
            spec: installer/gameplay_recorder_mac.spec
            ffmpeg_url: https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip
            ffmpeg_archive: ffmpeg.zip
            ffmpeg_extract_cmd: >-
              unzip -j ffmpeg.zip ffmpeg -d resources/ffmpeg
            scrcpy_url: https://github.com/Genymobile/scrcpy/releases/download/v3.3.4/scrcpy-macos-aarch64-v3.3.4.tar.gz
            scrcpy_archive: scrcpy.tar.gz
            scrcpy_extract_cmd: >-
              mkdir -p resources/scrcpy &&
              tar -xzf scrcpy.tar.gz --strip-components=1 -C resources/scrcpy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e "." "pyinstaller>=6.0"

      - name: Download bundled ffmpeg
        # NOTE: ffmpeg URLs are best-effort at time of writing and may need
        # tuning post-launch if upstream release naming conventions change.
        run: |
          curl -L "${{ matrix.ffmpeg_url }}" -o "${{ matrix.ffmpeg_archive }}"
          ${{ matrix.ffmpeg_extract_cmd }}

      - name: Download bundled scrcpy
        # NOTE: scrcpy v3.3.4 — pinned to match the version the codebase was written against.
        # If upstream renames release archives, update the matrix URLs.
        run: |
          mkdir -p resources/scrcpy || true
          curl -L "${{ matrix.scrcpy_url }}" -o "${{ matrix.scrcpy_archive }}"
          ${{ matrix.scrcpy_extract_cmd }}

      - name: Build with PyInstaller
        run: pyinstaller ${{ matrix.spec }} --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gameplay_recorder-${{ matrix.os }}
          path: dist/gameplay_recorder/

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gameplay_recorder/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
